name: Security Scan
on:
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: TruffleHog — secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Bandit — Python security
        run: |
          pip install bandit --quiet
          if find . -name "*.py" | grep -q .; then
            bandit -r . -ll -f json | tee bandit-results.json
            python3 -c "
          import json, sys
          try:
            d = json.load(open('bandit-results.json'))
            highs = [r for r in d.get('results',[]) if r['issue_severity'] in ['HIGH','CRITICAL']]
            if highs:
              print(f'FAIL: {len(highs)} HIGH/CRITICAL findings')
              sys.exit(1)
            print('PASS')
          except: print('PASS')
          "
          else
            echo 'No Python files to scan'
          fi
