name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout
      run: |
        git clone --depth=2 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .
        git checkout "${{ github.sha }}" 2>/dev/null || true

    - name: TruffleHog — secret scan
      run: |
        curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
          | sh -s -- -b /usr/local/bin
        trufflehog git file://. --since-commit HEAD~1 --only-verified --fail || true

  sast:
    name: SAST
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      run: |
        git clone --depth=1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .

    - name: Bandit — Python
      run: |
        pip install bandit --quiet
        if find . -name "*.py" | grep -q .; then
          bandit -r . -ll -f json -o bandit-results.json || true
          python3 -c "import json,sys; d=json.load(open('bandit-results.json')); highs=[r for r in d.get('results',[]) if r['issue_severity'] in ['HIGH','CRITICAL']]; print('FAIL: {} HIGH/CRITICAL findings'.format(len(highs))) if highs else print('PASS'); sys.exit(1) if highs else None"
        else
          echo 'No Python files to scan'
        fi

    - name: pip-audit — dependency vulnerabilities
      run: |
        pip install pip-audit --quiet
        if [ -f requirements.txt ]; then
          pip-audit -r requirements.txt --format=json -o pip-audit.json || true
          python3 -c "import json,sys; d=json.load(open('pip-audit.json')); vulns=[v for dep in d.get('dependencies',[]) for v in dep.get('vulns',[])]; print('Found {} vulnerabilities'.format(len(vulns))) if vulns else print('PASS')"
        else
          echo 'No requirements.txt'
        fi

    - name: Checkov — IaC
      run: |
        pip install checkov --quiet
        if find . -name "*.tf" | grep -q .; then
          checkov -d . --framework terraform --soft-fail --compact || true
        else
          echo 'No IaC files to scan'
        fi
