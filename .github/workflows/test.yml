name: Test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      run: git clone --depth=1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .
    - run: pip3 install -r requirements.txt 2>/dev/null || true
    - run: python3 -m pytest tests/ -v 2>/dev/null || echo "No tests yet"
    - run: pip3 install bandit --quiet && python3 -m bandit -r . -ll --exit-zero
